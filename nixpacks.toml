[phases.setup]
nixPkgs = [
    "...", 
    "chromium", 
    "chromedriver",
    # Replacing aptPkgs with their Nix equivalents
    "nss",
    "gconf",
    "fontconfig",
    "xorg.libX11",
    "xorg.libXcomposite",
    "xorg.libXcursor",
    "xorg.libXdamage",
    "xorg.libXext",
    "xorg.libXfixes",
    "xorg.libXi",
    "xorg.libXrandr",
    "xorg.libXrender",
    "xorg.libXScrnSaver",
    "xorg.libXtst",
    "glib"
]

[variables]
# Update the path to match the Nix environment standard
CHROMIUM_BIN = "/run/current-system/sw/bin/chromium"
CHROMIUM_FLAGS = "--headless --no-sandbox --disable-gpu --disable-dev-shm-usage"
